<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة شحنة</title>
    <style>
        * { box-sizing: border-box; font-family: 'Tahoma', Arial, sans-serif; }
        body { background: #f5f7fa; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #34495e; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: 0.3s; background: #fafafa; }
        input:focus, select:focus { border-color: #3498db; outline: none; background: white; }
        .required { color: #e74c3c; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        button:hover { background: #2980b9; transform: scale(1.02); }
        #response { margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 إضافة شحنة</h2>
        <form id="shippingForm">
            <label>اسم المستلم <span class="required">*</span></label>
            <input type="text" id="name" placeholder="اسم المستلم" required>

            <label>رقم هاتف المستلم <span class="required">*</span></label>
            <input type="tel" id="phone" placeholder="رقم هاتف المستلم" required>

            <label>رقم هاتف آخر للمستلم</label>
            <input type="tel" id="phone2" placeholder="رقم هاتف آخر للمستلم">

            <label>المحافظة <span class="required">*</span></label>
            <select id="governorate" required>
                <option value="">اختر المحافظة</option>
                <option value="الرياض">الرياض</option>
                <option value="جدة">جدة</option>
                <option value="مكة">مكة</option>
                <option value="المدينة">المدينة</option>
                <option value="الدمام">الدمام</option>
                <option value="الخبر">الخبر</option>
                <option value="الظهران">الظهران</option>
                <option value="بريدة">بريدة</option>
                <option value="تبوك">تبوك</option>
                <option value="أبها">أبها</option>
            </select>

            <label>المدينة <span class="required">*</span></label>
            <select id="city" required>
                <option value="">اختر المحافظة أولاً</option>
            </select>

            <label>منطقة الوصول <span class="required">*</span></label>
            <input type="text" id="area" placeholder="المنطقة" required>

            <label>شارع المستلم <span class="required">*</span></label>
            <input type="text" id="street" placeholder="شارع المستلم" required>

            <button type="submit">🚀 إضافة شحنة</button>
        </form>
        <div id="response"></div>
    </div>

    <script>
        // بيانات المدن حسب المحافظة
        const cities = {
            'الرياض': ['الرياض', 'الدرعية', 'الخرج', 'المجمعة', 'القويعية'],
            'جدة': ['جدة', 'مكة', 'الطائف', 'رابغ', 'خليص'],
            'مكة': ['مكة', 'جدة', 'الطائف', 'رابغ'],
            'المدينة': ['المدينة', 'ينبع', 'العلا', 'خيبر'],
            'الدمام': ['الدمام', 'الخبر', 'الظهران', 'القطيف', 'رأس تنورة'],
            'الخبر': ['الخبر', 'الدمام', 'الظهران', 'القطيف'],
            'الظهران': ['الظهران', 'الدمام', 'الخبر', 'القطيف'],
            'بريدة': ['بريدة', 'عنيزة', 'الرس', 'المذنب'],
            'تبوك': ['تبوك', 'ضباء', 'الوجه', 'حقل'],
            'أبها': ['أبها', 'خميس مشيط', 'النماص', 'محايل عسير']
        };

        const governorateSelect = document.getElementById('governorate');
        const citySelect = document.getElementById('city');

        governorateSelect.addEventListener('change', function() {
            const selected = this.value;
            citySelect.innerHTML = '<option value="">اختر المحافظة أولاً</option>';
            
            if (selected && cities[selected]) {
                cities[selected].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        });

        // إرسال النموذج
        document.getElementById('shippingForm').onsubmit = async function(e) {
            e.preventDefault();
            const res = document.getElementById('response');
            res.className = '';
            res.style.display = 'none';

            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                phone2: document.getElementById('phone2').value,
                governorate: document.getElementById('governorate').value,
                city: document.getElementById('city').value,
                area: document.getElementById('area').value,
                street: document.getElementById('street').value
            };

            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbw4UjaHv4Vn0iHDsBI_Wx5AbrqGOfIxDJ5K-PRjJGtrSzCwbufVQR7QVkG1NTaeyINX/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    res.textContent = '✅ تم إضافة الشحنة بنجاح!';
                    res.className = 'success';
                    document.getElementById('shippingForm').reset();
                    citySelect.innerHTML = '<option value="">اختر المحافظة أولاً</option>';
                } else {
                    res.textContent = '❌ ' + result.message;
                    res.className = 'error';
                }
            } catch (error) {
                res.textContent = '❌ خطأ في الاتصال بالخادم';
                res.className = 'error';
            }
        };
    </script>
</body>
</html>
