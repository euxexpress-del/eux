<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة شحنة</title>
    <style>
        * { box-sizing: border-box; font-family: 'Tahoma', Arial, sans-serif; }
        body { background: #f5f7fa; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #34495e; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: 0.3s; background: #fafafa; }
        input:focus, select:focus { border-color: #3498db; outline: none; background: white; }
        .required { color: #e74c3c; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        button:hover { background: #2980b9; transform: scale(1.02); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #response { margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 إضافة شحنة</h2>
        <form id="shippingForm">
            <label>اسم البراند <span class="required">*</span></label>
            <input type="text" id="brand" placeholder="أدخل اسم البراند الخاص بك" required>

            <label>اسم المستلم <span class="required">*</span></label>
            <input type="text" id="name" placeholder="اسم المستلم الثنائي أو الثلاثي" required>

            <label>رقم هاتف المستلم <span class="required">*</span></label>
            <input type="tel" id="phone" placeholder="رقم هاتف المستلم" required>

            <label>رقم هاتف آخر للمستلم</label>
            <input type="tel" id="phone2" placeholder="رقم هاتف إضافي إن وجد">

            <label>المحافظة <span class="required">*</span></label>
            <select id="governorate" required>
                <option value="">اختر المحافظة</option>
                <option value="الشرقية">الشرقية</option>
                <option value="الجيزة">الجيزة</option>
                <option value="الغربية">الغربية</option>
                <option value="الدقهلية">الدقهلية</option>
                <option value="الإسكندرية">الإسكندرية</option>
                <option value="أسيوط">أسيوط</option>
                <option value="أسوان">أسوان</option>
                <option value="بني سويف">بني سويف</option>
                <option value="القليوبية">القليوبية</option>
                <option value="القاهرة">القاهرة</option>
                <option value="البحيرة">البحيرة</option>
                <option value="دمياط">دمياط</option>
                <option value="الفيوم">الفيوم</option>
                <option value="البحر الأحمر">البحر الأحمر</option>
                <option value="الإسماعيلية">الإسماعيلية</option>
                <option value="كفر الشيخ">كفر الشيخ</option>
                <option value="الأقصر">الأقصر</option>
                <option value="مرسى مطروح">مرسى مطروح</option>
                <option value="المنيا">المنيا</option>
                <option value="بور سعيد">بور سعيد</option>
                <option value="قنا">قنا</option>
                <option value="المنوفية">المنوفية</option>
                <option value="سوهاج">سوهاج</option>
                <option value="السويس">السويس</option>
                <option value="الوادي الجديد">الوادي الجديد</option>
                <option value="جنوب سيناء">جنوب سيناء</option>
            </select>

            <label>المركز / المدينة <span class="required">*</span></label>
            <select id="city" required>
                <option value="">اختر المحافظة أولاً</option>
            </select>

            <label>ادخل العنوان بالكامل <span class="required">*</span></label>
            <input type="text" id="street" placeholder="المنطقة، اسم الشارع، رقم العقار أو علامة مميزة" required>

            <button type="submit" id="submitBtn">🚀 إضافة شحنة</button>
        </form>
        <div id="response"></div>
    </div>

    <script>
        const cities = {
            'الشرقية': ['بلبيس', 'انشاص الرمل', 'أولاد صقر', 'الحسينية', 'ديرب نجم', 'فاقوس', 'كفر صقر', 'مشتول السوق', 'منيا القمح', 'الصالحية القديمة', 'الصالحية الجديدة', 'صان الحجر', 'مدينة العاشر من رمضان'],
            'الجيزة': ['مدينة السادس من أكتوبر', 'مدينة الشيخ زايد', 'العياط', 'الحوامدية', 'البدرشين', 'الصف', 'العمرانية', 'أطفيح', 'الواحات البحرية', 'الجيزة', 'حدائق الاهرام', 'فيصل', 'الهرم', 'أبو النمرس', 'العجوزة', 'الوراق', 'أوسيم', 'بولاق الدكرور', 'الدقي', 'أرض اللواء', 'المهندسين', 'كرداسة', 'إمبابة', 'منشأة القناطر'],
            'الغربية': ['كفر الزيات', 'المحلة الكبرى', 'سمنود', 'بسيون', 'السنطة', 'زفتى', 'قطور', 'طنطا'],
            'الدقهلية': ['المنصورة', 'أجا', 'المنزلة', 'بلقاس', 'دكرنس', 'السنبلاوين', 'منية النصر', 'ميت غمر', 'شربين', 'طلخا'],
            'الإسكندرية': ['الدخيلة', 'العامرية', 'برج العرب', 'محرم بيك', 'باب شرقي', 'الساحل الشمالي', 'سيدي جابر', 'العطارين', 'المنشية', 'اللبان', 'الجمرك', 'مينا البصل', 'كرموز', 'الرمل', 'المنتزه'],
            'أسيوط': ['أبنوب', 'أبوتيج', 'البداري', 'الغنايم', 'الفتح', 'القوصية', 'ديروط', 'ساحل سليم', 'صدفا', 'مدينة أسيوط', 'منفلوط', 'منقباد'],
            'أسوان': ['أسوان', 'كوم امبو', 'دراو', 'إدفو'],
            'بني سويف': ['الواسطى', 'ناصر', 'مدينة بني سويف', 'مركز بني سويف', 'أهناسيا', 'ببا', 'سمسطا', 'الفشن'],
            'القليوبية': ['بنها', 'الخانكة', 'العبور', 'القناطر الخيرية', 'شبين القناطر', 'طوخ', 'كفر شكر', 'قليوب', 'شبرا الخيمة'],
            'القاهرة': ['عابدين', 'العباسية', 'الأزبكية', 'القطامية', 'المنيل', 'المقطم', 'دار السلام', 'البساتين', 'الجمالية', 'السيدة زينب', 'حلوان', 'المعادي', 'مصر القديمة', 'قصر النيل', 'الخليفة', 'طرة', 'الزمالك', 'الشروق', 'مدينة بدر', 'عين شمس', 'مدينتي', 'الزيتون', 'مدينة nsr', 'القاهرة الجديدة', 'هليوبوليس', 'الأميرية', 'السلام', 'الوايلي', 'الشرابية', 'المرج', 'المطرية', 'النزهة', 'حدائق القبة', 'شبرا مصر', 'كورنيش النيل'],
            'البحيرة': ['دمنهور', 'كفر الدوار', 'أبو حمص', 'المحمودية', 'وادي النطرون', 'النوبارية', 'أبوالمطامير', 'حوش عيسي', 'إيتاي البارود', 'شبراخيت', 'رشيد', 'إدكوا', 'مركز بدر', 'الدلنجات', 'الرحمانية', 'كوم حمادة'],
            'دمياط': ['فارسكور', 'دمياط القديمة', 'كفر سعد', 'الزرقا', 'كفر البطيخ', 'دمياط الجديدة', 'رأس البر', 'عزبة البرج'],
            'الفيوم': ['طامية', 'سنورس', 'مركز الفيوم', 'مدينة الفيوم', 'أطسا', 'أبشواي', 'يوسف الصديق'],
            'البحر الأحمر': ['الغردقة', 'رأس غارب', 'سفاجا', 'القصير', 'مرسى علم'],
            'الإسماعيلية': ['الإسماعيلية'],
            'كفر الشيخ': ['كفر الشيخ', 'دسوق', 'فوه', 'مطوبس', 'بلطيم', 'الحامول', 'الرياض', 'بيلا', 'قلين', 'سيدى سالم'],
            'الأقصر': ['مدينة الأقصر', 'أرمنت', 'أسنا', 'القرنة'],
            'مرسى مطروح': ['مرسى مطروح'],
            'المنيا': ['العدوة', 'مغاغة', 'بني مزار', 'مطاي', 'سمالوط', 'مركز المنيا', 'مدينة المنيا', 'أبو قرقاص', 'ملوي', 'دير مواس'],
            'بور سعيد': ['بورسعيد'],
            'قنا': ['قنا', 'قوص', 'مدينة قفط', 'دشنا', 'نقادة', 'نجع حمادي', 'فرشوط', 'أبوتشت'],
            'المنوفية': ['قويسنا', 'بركة السبع', 'السادات', 'الشهداء', 'تلا', 'شبين الكوم', 'الباجور', 'منوف', 'أشمون'],
            'سوهاج': ['طما', 'طهطا', 'جهينة', 'المراغة', 'مدينة سوهاج', 'أخميم', 'ساقلته', 'المنشأة', 'جرجا', 'البلينا', 'دار السلام', 'العسيرات'],
            'السويس': ['السويس'],
            'الوادي الجديد': ['الخارجة', 'الداخلة', 'الفرافرة'],
            'جنوب سيناء': ['جنوب سيناء', 'شرم الشيخ', 'دهب']
        };

        const governorateSelect = document.getElementById('governorate');
        const citySelect = document.getElementById('city');

        governorateSelect.addEventListener('change', function() {
            const selected = this.value;
            citySelect.innerHTML = '<option value="">اختر المركز / المدينة</option>';
            if (selected && cities[selected]) {
                cities[selected].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        });

        document.getElementById('shippingForm').onsubmit = function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const res = document.getElementById('response');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ جاري الإرسال...';
            
            res.className = '';
            res.style.display = 'none';

            // الرابط الجديد الفعّال الخاص بك
            const scriptUrl = 'https://script.google.com/macros/s/AKfycbxbB4N3PsnvSYoEeomLcXJjxyXeyWklzWBYQ4Sb2yUwKYOc7P24s5ERHxKCyF4F6fR_/exec';

            // إرسال المسميات المطلوبة بنظام المربعات النصية المشفرة
            const searchParams = new URLSearchParams();
            searchParams.append('brand', document.getElementById('brand').value);
            searchParams.append('name', document.getElementById('name').value);
            searchParams.append('phone', document.getElementById('phone').value);
            searchParams.append('phone2', document.getElementById('phone2').value);
            searchParams.append('governorate', governorateSelect.value);
            searchParams.append('city', citySelect.value);
            searchParams.append('street', document.getElementById('street').value);

            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: searchParams.toString()
            })
            .then(() => {
                res.textContent = '✅ تم إضافة الشحنة بنجاح!';
                res.className = 'success';
                res.style.display = 'block';
                
                document.getElementById('shippingForm').reset();
                citySelect.innerHTML = '<option value="">اختر المحافظة أولاً</option>';
            })
            .catch((error) => {
                console.error('Error:', error);
                res.textContent = '❌ حدث خطأ أثناء الاتصال بالخادم';
                res.className = 'error';
                res.style.display = 'block';
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 إضافة شحنة';
            });
        };
    </script>
</body>
</html>
