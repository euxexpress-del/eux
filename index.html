<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب فتح حساب جديد</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #2ecc71;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #2ecc71;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>طلب فتح حساب جديد</h2>
    <form id="registrationForm">
        <div class="input-group">
            <label for="name">الاسم المعتمد:</label>
            <input type="text" id="name" name="name" placeholder="أدخل اسمك الكامل" required>
        </div>
        <div class="input-group">
            <label for="phone">رقم الهاتف:</label>
            <input type="tel" id="phone" name="phone" placeholder="أدخل رقم هاتفك" required>
        </div>
        <button type="submit" id="submitBtn">إرسال الطلب</button>
    </form>
    <div id="message"></div>
</div>

<script>
    const form = document.getElementById('registrationForm');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    
    // الرابط الخاص بك الذي قمت باستخراجه
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbw4UjaHv4Vn0iHDsBI_Wx5AbrqGOfIxDJ5K-PRjJGtrSzCwbufVQR7QVkG1NTaeyINX/exec';

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري إرسال البيانات...';
        messageDiv.style.display = 'none';

        const formData = new FormData(form);
        const params = new URLSearchParams(formData).toString();

        // إرسال البيانات إلى جدول جوجل عبر الرابط الخاص بك
        fetch(`${webAppUrl}?${params}`, {
            method: 'POST'
        })
        .then(response => {
            messageDiv.style.display = 'block';
            messageDiv.className = 'success';
            messageDiv.innerText = 'تم إرسال طلبك بنجاح! شكراً لك.';
            form.reset();
        })
        .catch(error => {
            messageDiv.style.display = 'block';
            messageDiv.className = 'error';
            messageDiv.innerText = 'حدث خطأ أثناء الإرسال، يرجى المحاولة مرة أخرى.';
            console.error('Error!', error.message);
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = 'إرسال الطلب';
        });
    });
</script>

</body>
</html>
