<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة EUX للشحن | الريادة في سرعة وحلول الشحن</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0076ff;
            --secondary-color: #1a1a1a;
            --light-bg: #f9f9f9;
            --text-color: #333;
            --white: #ffffff;
            --gold-accent: #ffb700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        body { color: var(--text-color); background-color: var(--white); overflow-x: hidden; }

        header { background-color: var(--secondary-color); padding: 20px 8%; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(0, 118, 255, 0.3); }
        .logo { color: var(--primary-color); font-size: 26px; font-weight: 900; text-decoration: none; }
        nav a { color: var(--white); text-decoration: none; margin-right: 25px; font-weight: 600; }
        
        .hero { background: linear-gradient(rgba(26, 26, 26, 0.88), rgba(26, 26, 26, 0.88)), url('https://images.unsplash.com/photo-1524661135-423995f22d0b?ixlib=rb-4.0.3') no-repeat center center/cover; min-height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--white); padding: 60px 20px; position: relative; }
        .hero h1 { font-size: 3rem; margin-bottom: 15px; font-weight: 700; }
        .hero h1 span { color: var(--primary-color); }
        .btn { display: inline-block; background-color: var(--primary-color); color: var(--white); padding: 12px 35px; border: none; border-radius: 30px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: 0.3s; }

        /* ستايل النافذة المنبثقة */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.4s; backdrop-filter: blur(8px); }
        .popup-overlay.active { opacity: 1; pointer-events: auto; }
        .popup-box { background: var(--white); padding: 40px 30px; border-radius: 24px; max-width: 450px; width: 90%; text-align: center; border-top: 6px solid var(--primary-color); }
        .popup-title { font-size: 1.1rem; font-weight: 700; color: var(--primary-color); margin-bottom: 25px; background: rgba(0, 118, 255, 0.08); padding: 12px; border-radius: 12px; }
        .popup-form-group { text-align: right; margin-bottom: 20px; }
        .popup-form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .popup-form-group input { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 12px; font-family: 'Cairo'; }
        .popup-submit-btn { width: 100%; background: var(--primary-color); color: var(--white); border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        .about { padding: 80px 10%; text-align: center; }
        .section-title { font-size: 2.2rem; margin-bottom: 40px; font-weight: 700; }
        footer { background-color: #111; color: #aaa; text-align: center; padding: 30px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">EUX EXPRESS</a>
        <nav>
            <a href="#about">من نحن</a>
            <a href="#contact">اتصل بنا</a>
        </nav>
    </header>

    <section class="hero">
        <h1>شركة <span>EUX</span> للشحن</h1>
        <p>الريادة في سرعة وحلول الشحن. نخدم القاهرة والجيزة وجميع محافظات مصر.</p>
        <button onclick="togglePopup(true)" class="btn"><i class="fas fa-user-plus"></i> افتح حساب الآن</button>
    </section>

    <!-- النافذة المنبثقة -->
    <div class="popup-overlay" id="accountPopup" onclick="closePopupOutside(event)">
        <div class="popup-box">
            <span class="popup-close" onclick="togglePopup(false)" style="cursor:pointer; float:left;">&times;</span>
            <div class="popup-title"><i class="far fa-clock"></i> سيتم التواصل خلال 5 ساعات لتفعيل الحساب</div>
            
            <form id="excelForm" onsubmit="submitToExcel(event)">
                <div class="popup-form-group">
                    <label>الاسم</label>
                    <input type="text" name="name" placeholder="أدخل اسمك بالكامل" required>
                </div>
                <div class="popup-form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" name="phone" placeholder="أدخل رقم الهاتف" required>
                </div>
                <button type="submit" class="popup-submit-btn">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <section id="about" class="about">
        <h2 class="section-title">لماذا شركة EUX؟</h2>
        <p>خبرة 3 أعوام من الاحترافية في تقديم حلول الشحن للتجار في مصر.</p>
    </section>

    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة لشركة EUX للشحن.</p>
    </footer>

    <script>
        function togglePopup(show) { const popup = document.getElementById('accountPopup'); if(show) { popup.classList.add('active'); } else { popup.classList.remove('active'); } }
        function closePopupOutside(event) { if (event.target === document.getElementById('accountPopup')) { togglePopup(false); } }

        function submitToExcel(event) {
            event.preventDefault();
            const submitBtn = event.target.querySelector('.popup-submit-btn');
            submitBtn.innerText = "جاري الإرسال...";
            const params = new URLSearchParams(new FormData(event.target)).toString();
            const webAppUrl = 'https://script.google.com/macros/s/AKfycbw4UjaHv4Vn0iHDsBI_Wx5AbrqGOfIxDJ5K-PRjJGtrSzCwbufVQR7QVkG1NTaeyINX/exec'; 

            fetch(`${webAppUrl}?${params}`, { method: 'POST' })
            .then(() => {
                alert('تم استلام طلبك! سيتم التواصل معك خلال 5 ساعات لتفعيل الحساب.');
                event.target.reset();
                togglePopup(false);
            })
            .catch(() => {
                alert('تم استلام طلبك! سيتم التواصل معك خلال 5 ساعات لتفعيل الحساب.');
                event.target.reset();
                togglePopup(false);
            })
            .finally(() => { submitBtn.innerText = "إرسال الطلب"; });
        }
    </script>
</body>
</html>
